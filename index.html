<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Geist', sans-serif; }
        .hidden { display: none; }
        .card-open { border-top: 4px solid #10b981; }
        .card-closed { border-top: 4px solid #8b5cf6; }
    </style>
</head>
<body class="bg-gray-50">
    <div id="loginSection" class="min-h-screen flex items-center justify-center p-4">
        <section class="bg-white border border-base-300 rounded-box w-full max-w-md p-6 shadow-lg">
            <div class="text-center mb-6">
                <img src="assets/github-logo.png" alt="GitHub Logo" class="mx-auto w-16 h-16 mb-3">
                <h1 class="text-2xl font-bold text-gray-800">GitHub Issues Tracker</h1>
                <p class="text-gray-500 mt-1">Sign in to manage your issues</p>
            </div>
            <form id="loginForm">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-600 mb-1">Username</label>
                    <input type="text" id="username" class="input input-bordered w-full" placeholder="Enter Username" />
                    <p class="text-xs text-blue-600 mt-1">Default: admin</p>
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-600 mb-1">Password</label>
                    <input type="password" id="password" class="input input-bordered w-full" placeholder="Enter your password" />
                    <p class="text-xs text-blue-600 mt-1">Default: admin123</p>
                </div>
                <button type="submit" class="btn btn-primary rounded-lg w-full mt-2">Sign In</button>
            </form>
            <div class="divider my-6">OR</div>
            <div class="bg-gray-50 rounded-lg p-4 text-center">
                <p class="text-sm font-medium text-gray-400 mb-2">Demo Credentials:</p>
                <div class="text-sm text-gray-600">
                    <p><span class="font-semibold">Username:</span> admin</p>
                    <p><span class="font-semibold">Password:</span> admin123</p>
                </div>
            </div>
        </section>
    </div>
    <div id="mainSection" class="hidden">
        <div class="navbar bg-base-100 shadow-sm px-4 md:px-8">
            <div class="flex-1">
                <a class="text-xl font-bold">GitHub Issues Tracker</a>
            </div>
            <div class="flex-none gap-2">
                <div class="form-control">
                    <div class="join">
                        <input type="text" id="searchInput" placeholder="Search..." class="input input-bordered join-item w-40 md:w-auto" />
                        <button id="searchBtn" class="btn btn-primary join-item">
                            <i class="fa fa-search"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
        <div class="container mx-auto px-4 py-6">
            <div class="tabs tabs-box mb-6">
                <a class="tab tab-lg tab-active bg-blue-500 text-white" data-status="all">All</a>
                <a class="tab tab-lg" data-status="open">Open</a>
                <a class="tab tab-lg" data-status="closed">Closed</a>
            </div>
            <div class="flex justify-between items-center mb-4">
                <div class="flex items-center gap-2">
                    <img src="assets/Aperture.png" alt="">
                    <span id="issueCount" class="font-bold">0 issues</span>
                </div>
                <div class="flex gap-4 text-sm">
                    <span class="flex items-center gap-1"><span class="w-2 h-2 bg-green-500 rounded-full"></span> Open</span>
                    <span class="flex items-center gap-1"><span class="w-2 h-2 bg-purple-500 rounded-full"></span> Closed</span>
                </div>
            </div>
            <div id="loading" class="flex justify-center my-8 hidden">
                <span class="loading loading-spinner loading-lg"></span>
            </div>
            <div id="issuesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
